name: Build Q-LOAD

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build q-load binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: q-load-linux-amd64
          - goos: linux
            goarch: arm64
            output: q-load-linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            output: q-load-linux-armv7
          - goos: android
            goarch: arm64
            output: q-load-android-arm64
          - goos: android
            goarch: arm
            goarm: 7
            output: q-load-android-armv7

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          go build -ldflags="-s -w" -o ${{ matrix.output }} main.go

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}
